[package]
name = "lotus"
version = "0.3.4"
edition = "2021"

build = "build.rs"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", features = ["napi4"] }
napi-derive = "2"
winit = { version = "0.30" }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
async-tungstenite = { version = "0.34", default-features = false, features = ["tokio-runtime", "tokio-rustls-manual-roots"] }
webrender = "0.68"
euclid = "0.22"
servo-url = { path = "servo/components/url" }

# Cross-platform dependencies
aes-gcm = "0.10"
memmap2 = "0.9"
lru = "0.12"
object = "0.36"
dpi = "0.1"
crossbeam-channel = "0.5"
url = "2.5"
env_logger = "0.11.8"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
libc = "0.2"
rmp-serde = "1.3.1"
rmpv = { version = "1.3", features = ["with-serde"] }
byteorder = "1.5.0"
uuid = { version = "1.20.0", features = ["v4"] }
tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", features = ["ws", "macros"] }
tower-http = { version = "0.5", features = ["cors", "fs"] }
glow = "0.17"
futures-util = "0.3"
dashmap = "5"
bytemuck = "1.16"
urlencoding = "2.1.3"
once_cell = "1.19"
dirs = "5.0"
mime_guess = "2.0.5"
http = "1.4.0"
window-vibrancy = "0.5"
dark-light = "1.0"

# Linux-only dependencies
[target.'cfg(target_os = "linux")'.dependencies]
servo = { path = "servo/components/servo", default-features = false, features = ["js_jit", "clipboard", "webgpu", "bluetooth", "native-bluetooth", "gamepad", "gstreamer", "media-gstreamer"] }
winit = { version = "0.30", features = ["x11", "wayland"] }
glutin = "0.32"
glutin-winit = "0.5"
raw-window-handle = "0.6"

# FreeBSD-only dependencies
[target.'cfg(target_os = "freebsd")'.dependencies]
servo = { path = "servo/components/servo", default-features = false, features = ["js_jit", "clipboard", "webgpu", "gamepad"] }
winit = { version = "0.30", features = ["x11", "wayland"] }
glutin = "0.32"
glutin-winit = "0.5"
raw-window-handle = "0.6"

# Windows-only dependencies
[target.'cfg(target_os = "windows")'.dependencies]
servo = { path = "servo/components/servo", default-features = false, features = ["no-wgl", "js_jit", "clipboard", "webgpu", "bluetooth", "native-bluetooth", "gamepad", "gstreamer", "media-gstreamer"] }
windows-sys = { version = "0.52", features = ["Win32_System_LibraryLoader", "Win32_System_Memory", "Win32_Foundation"] }

# For any other platform (like macOS)
[target.'cfg(not(any(target_os = "linux", target_os = "freebsd", target_os = "windows")))'.dependencies]
servo = { path = "servo/components/servo", default-features = false, features = ["js_jit", "clipboard", "webgpu", "bluetooth", "native-bluetooth", "gamepad", "gstreamer", "media-gstreamer"] }

[build-dependencies]
napi-build = "2"

[profile.dev]
split-debuginfo = "unpacked"
incremental = true
debug = 1

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"

