<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            padding: 20px; /* Space for the shadow */
            height: 100vh; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }
        .palette { 
            background: rgba(30, 41, 59, 0.95); 
            backdrop-filter: blur(10px);
            width: 100%; 
            height: 100%;
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
        }
        input { 
            background: #0f172a; 
            border: none; 
            padding: 20px; 
            color: white; 
            font-size: 1.2rem; 
            width: 100%; 
            outline: none; 
            box-sizing: border-box; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-family: 'Inter', sans-serif;
        }
        .results { padding: 10px; color: #94a3b8; font-size: 0.9rem; flex-grow: 1; }
        .result-item { padding: 12px; cursor: pointer; }
        .result-item:hover, .result-item.selected { background: #334155; color: white; }
        
        .tip {
            padding: 10px;
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div class="palette">
        <input type="text" id="search" placeholder="Type a command..." autofocus>
        <div class="results">
            <div class="result-item selected">Toggle Terminal</div>
            <div class="result-item">Close Window</div>
            <div class="result-item">Cancel</div>
        </div>
        <div class="tip">Native Compositing Path: Enabled</div>
    </div>

    <script>
        const input = document.getElementById('search');
        
        window.addEventListener('focus', () => {
            input.focus();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (window.lotus) window.lotus.send('palette-close');
            } else if (e.key === 'Enter') {
                if (window.lotus) {
                    window.lotus.send('toggle-terminal');
                    window.lotus.send('palette-close');
                }
            }
        });
    </script>
</body>
</html>
