name: Release
env:
  DEBUG: napi:*
  APP_NAME: lotus
  MACOSX_DEPLOYMENT_TARGET: '10.13'
permissions:
  contents: write
  id-token: write
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            setup: |
              choco install llvm nasm python311 pkgconfiglite --no-progress -y
              echo "LIBCLANG_PATH=C:/Program Files/LLVM/lib" >> $GITHUB_ENV
              echo "PYTHON=python" >> $GITHUB_ENV
            build: |
              npm run build --workspace=@lotus-gui/core -- --target x86_64-pc-windows-msvc && npm run extract-angle --workspace=@lotus-gui/core
            target: x86_64-pc-windows-msvc
            build_id: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_id: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            setup: |
              sudo apt-get update
              sudo apt-get install -y libgl1-mesa-dev libssl-dev python3 libfontconfig1-dev dpkg-dev fakeroot rpm pkg-config libdbus-1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-good1.0-dev libgstreamer-plugins-bad1.0-dev
            build: |
              npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_id: x86_64-unknown-linux-suse
            setup: |
              docker pull opensuse/tumbleweed
            build: |
              printf '%s\n' \
                '#include <stdlib.h>' \
                '#define EMULATED_THREADS_H_INCLUDED_' \
                > /tmp/glslopt_compat.h
              docker run --rm -v $GITHUB_WORKSPACE:/workspace -v /tmp/glslopt_compat.h:/tmp/glslopt_compat.h -w /workspace opensuse/tumbleweed /bin/sh -c "
                set -e
                zypper --non-interactive refresh
                zypper --non-interactive install -y nodejs-npm gcc gcc-c++ fontconfig-devel Mesa-libGL-devel libopenssl-devel dbus-1-devel pkgconf-pkg-config python311 git gzip tar dpkg rpm-build zip unzip curl clang clang-devel lld gstreamer-devel gstreamer-plugins-base-devel gstreamer-plugins-bad-devel
                curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                export PATH=\"\$HOME/.cargo/bin:\$PATH\"
                export CFLAGS=\"-include /tmp/glslopt_compat.h\"
                npm install
                npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-linux-gnu
                mv packages/lotus-core/lotus.linux-x64-gnu.node packages/lotus-core/lotus.linux-x64-suse.node
                mv packages/lotus-core/bindings-x86_64-unknown-linux-gnu packages/lotus-core/bindings-x86_64-unknown-linux-suse 2>/dev/null || true
              "
          - host: ubuntu-latest
            target: x86_64-unknown-freebsd
            build_id: x86_64-unknown-freebsd
            setup: |
              sudo apt-get update && sudo apt-get install -y --fix-missing \
                libfontconfig1-dev libgl1-mesa-dev libssl-dev \
                clang libclang-dev lld pkg-config build-essential python3

              # zig 0.13.0 bundles Linux libc headers but NOT FreeBSD libc headers.
              # When zig cc targets x86_64-freebsd, it adds its own clang built-in headers
              # (lib/include) which include xmmintrin.h -> mm_malloc.h -> <stdlib.h>.
              # Since zig has no FreeBSD stdlib.h, the build fails.
              # Fix: create a minimal stdlib.h stub and inject it via -isystem in the wrapper.
              mkdir -p /tmp/freebsd-stubs
              printf '%s\n' \
                '#pragma once' \
                '#ifndef _STDLIB_H' \
                '#define _STDLIB_H' \
                'typedef __SIZE_TYPE__ size_t;' \
                'void *malloc(size_t size);' \
                'void *calloc(size_t n, size_t size);' \
                'void *realloc(void *ptr, size_t size);' \
                'void free(void *ptr);' \
                'void abort(void);' \
                'void exit(int status);' \
                'int abs(int n);' \
                'long labs(long n);' \
                '#define EXIT_SUCCESS 0' \
                '#define EXIT_FAILURE 1' \
                '#ifndef NULL' \
                '#define NULL ((void*)0)' \
                '#endif' \
                '#endif' \
                > /tmp/freebsd-stubs/stdlib.h
              printf '%s\n' \
                '#pragma once' \
                '#ifndef _ASSERT_H' \
                '#define _ASSERT_H' \
                '#ifdef NDEBUG' \
                '#define assert(x) ((void)0)' \
                '#else' \
                '#define assert(x) ((x) ? (void)0 : __builtin_trap())' \
                '#endif' \
                '#endif' \
                > /tmp/freebsd-stubs/assert.h

              sudo install -d /usr/local/bin
              printf '%s\n' \
                '#!/usr/bin/env bash' \
                'args=(); for a in "$@"; do [[ "$a" == --target=* || "$a" == -m64 ]] && continue; args+=("$a"); done' \
                'exec zig cc -target x86_64-freebsd -isystem /tmp/freebsd-stubs "${args[@]}"' \
                | sudo tee /usr/local/bin/x86_64-unknown-freebsd-gcc >/dev/null
              printf '%s\n' \
                '#!/usr/bin/env bash' \
                'args=(); for a in "$@"; do [[ "$a" == --target=* || "$a" == -m64 ]] && continue; args+=("$a"); done' \
                'exec zig c++ -target x86_64-freebsd -isystem /tmp/freebsd-stubs "${args[@]}"' \
                | sudo tee /usr/local/bin/x86_64-unknown-freebsd-g++ >/dev/null
              printf '%s\n' '#!/usr/bin/env bash' 'exec zig ar "$@"' | sudo tee /usr/local/bin/x86_64-unknown-freebsd-ar >/dev/null
              printf '%s\n' '#!/usr/bin/env bash' 'exec zig ranlib "$@"' | sudo tee /usr/local/bin/x86_64-unknown-freebsd-ranlib >/dev/null
              sudo chmod +x /usr/local/bin/x86_64-unknown-freebsd-gcc \
                /usr/local/bin/x86_64-unknown-freebsd-g++ \
                /usr/local/bin/x86_64-unknown-freebsd-ar \
                /usr/local/bin/x86_64-unknown-freebsd-ranlib

              echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
              echo "CC_x86_64_unknown_freebsd=x86_64-unknown-freebsd-gcc" >> $GITHUB_ENV
              echo "CXX_x86_64_unknown_freebsd=x86_64-unknown-freebsd-g++" >> $GITHUB_ENV
              echo "AR_x86_64_unknown_freebsd=x86_64-unknown-freebsd-ar" >> $GITHUB_ENV
              echo "RANLIB_x86_64_unknown_freebsd=x86_64-unknown-freebsd-ranlib" >> $GITHUB_ENV
              echo "CARGO_TARGET_X86_64_UNKNOWN_FREEBSD_LINKER=x86_64-unknown-freebsd-gcc" >> $GITHUB_ENV
            build: |
              npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-freebsd

              # Post-build verification: patch was applied during prebuild, confirm tikv-jemalloc is gone
              echo "[Lotus] Verifying tikv-jemalloc is excluded from FreeBSD dependency tree..."
              if cd packages/lotus-core && cargo tree --target x86_64-unknown-freebsd 2>/dev/null | grep -q "tikv-jemalloc"; then
                echo "[Error] tikv-jemalloc still found in dependency tree after patch!"
                exit 1
              fi
              cd "$GITHUB_WORKSPACE"
              echo "[Lotus] Success: tikv-jemalloc excluded."

              mv packages/lotus-core/lotus.linux-x64-gnu.node packages/lotus-core/lotus.freebsd-x64.node
              mv packages/lotus-core/bindings-x86_64-unknown-linux-gnu packages/lotus-core/bindings-x86_64-unknown-freebsd 2>/dev/null || true
    name: stable - ${{ matrix.settings.build_id }} - node@20
    runs-on: ${{ matrix.settings.host }}
    steps:
      - name: Enable long paths on Windows
        if: runner.os == 'Windows'
        run: |
          git config --global core.longpaths true
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -Force
        shell: powershell
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # MSVC/mozangle still hit legacy MAX_PATH under deep GitHub workspaces (e.g. packages/lotus-core/target/...).
      - name: Short Cargo and temp dirs (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p "/d/t" "/d/tmp"
          echo "CARGO_TARGET_DIR=D:/t" >> "$GITHUB_ENV"
          echo "TMP=D:/tmp" >> "$GITHUB_ENV"
          echo "TEMP=D:/tmp" >> "$GITHUB_ENV"
      - name: Setup node
        uses: actions/setup-node@v4
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: 20
          cache: npm
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
            ${{ runner.os == 'Windows' && 'D:/t' || '' }}
          key: ${{ matrix.settings.build_id }}-cargo-${{ matrix.settings.host }}
      - uses: goto-bus-stop/setup-zig@v2
        if: ${{ matrix.settings.target == 'x86_64-unknown-freebsd' }}
        with:
          version: 0.13.0
      - uses: goto-bus-stop/setup-zig@v2
        if: ${{ matrix.settings.target == 'armv7-unknown-linux-gnueabihf' }}
        with:
          version: 0.11.0
      - name: Setup GStreamer (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $gstVer = "1.24.13"
          $gstBase = "https://gstreamer.freedesktop.org/data/pkg/windows/$gstVer/msvc"
          $ua = "chocolatey command line"
          Write-Host "Installing GStreamer $gstVer runtime via choco..."
          choco install gstreamer --version $gstVer --no-progress -y
          $gstRoot = [System.Environment]::GetEnvironmentVariable("GSTREAMER_1_0_ROOT_MSVC_X86_64", "Machine")
          if (-not $gstRoot) { $gstRoot = "D:\gstreamer\1.0\msvc_x86_64" }
          $gstRoot = $gstRoot.TrimEnd('\')
          Write-Host "GStreamer runtime root: $gstRoot"
          Write-Host "Downloading GStreamer $gstVer devel MSI..."
          $devel = "$env:TEMP\gstreamer-devel.msi"
          & curl.exe -fsSL --user-agent $ua `
            -o $devel "$gstBase/gstreamer-1.0-devel-msvc-x86_64-$gstVer.msi"
          $installDir = Split-Path (Split-Path $gstRoot -Parent) -Parent
          Write-Host "Installing GStreamer devel to $installDir ..."
          Start-Process msiexec -ArgumentList "/i `"$devel`" /qn TARGETDIR=`"$installDir`"" -Wait -NoNewWindow
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=$gstRoot" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$gstRoot\lib\pkgconfig" >> $env:GITHUB_ENV
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Install dependencies
        run: npm install
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.build_id }}
          path: |
            packages/lotus-core/*.node
            packages/lotus-core/index.js
            packages/lotus-core/index.d.ts
            packages/lotus-core/windows/*.dll
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move artifacts
        run: |
          npm run artifacts --workspace=@lotus-gui/core
        continue-on-error: true # Just in case script missing, but we handle via direct move
      # Manually move artifacts to core
      - name: Distribute artifacts
        run: |
          ls -R artifacts
          mv artifacts/bindings-*/*.node packages/lotus-core/
          # Copy windows DLLs if they exist
          mkdir -p packages/lotus-core/windows
          cp artifacts/bindings-x86_64-pc-windows-msvc/windows/*.dll packages/lotus-core/windows/ 2>/dev/null || true
          # Copy index.js and index.d.ts from one of the artifact folders (they are identical across platforms)
          cp artifacts/bindings-x86_64-unknown-linux-gnu/index.js packages/lotus-core/
          cp artifacts/bindings-x86_64-unknown-linux-gnu/index.d.ts packages/lotus-core/
          ls -la packages/lotus-core/
      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --workspace=@lotus-gui/core --access public
          npm publish --workspace=@lotus-gui/dev --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: packages/lotus-core/*.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
