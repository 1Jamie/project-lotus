name: Release
env:
  DEBUG: napi:*
  APP_NAME: lotus
  MACOSX_DEPLOYMENT_TARGET: '10.13'
permissions:
  contents: write
  id-token: write
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            setup: |
              choco install llvm nasm python311 pkgconfiglite --no-progress -y
              powershell -Command "
                $gst_version = '1.24.13'
                $gst_runtime_url = ""https://gstreamer.freedesktop.org/data/pkg/windows/$($gst_version)/msvc/gstreamer-1.0-msvc-x86_64-$($gst_version).msi""
                $gst_devel_url = ""https://gstreamer.freedesktop.org/data/pkg/windows/$($gst_version)/msvc/gstreamer-1.0-devel-msvc-x86_64-$($gst_version).msi""
                
                Write-Host ""Downloading GStreamer runtime from $gst_runtime_url""
                (New-Object System.Net.WebClient).DownloadFile($gst_runtime_url, 'gstreamer.msi')
                Write-Host ""Installing GStreamer runtime...""
                Start-Process msiexec.exe -ArgumentList '/i gstreamer.msi /qn' -Wait
                
                Write-Host ""Downloading GStreamer devel from $gst_devel_url""
                (New-Object System.Net.WebClient).DownloadFile($gst_devel_url, 'gstreamer-devel.msi')
                Write-Host ""Installing GStreamer devel...""
                Start-Process msiexec.exe -ArgumentList '/i gstreamer-devel.msi /qn' -Wait
                
                $gstPath = 'C:\gstreamer\1.0\msvc_x86_64'
                if (-not (Test-Path $gstPath)) { throw ""GStreamer not found at $gstPath after installation"" }
                
                Write-Host ""Found GStreamer at: $gstPath""
                New-Item -ItemType Junction -Path 'C:\gst' -Target $gstPath
              "
              echo "LIBCLANG_PATH=C:/Program Files/LLVM/lib" >> $GITHUB_ENV
              echo "PYTHON=python" >> $GITHUB_ENV
              echo "GSTREAMER_1_0_ROOT_X86_64=C:/gst" >> $GITHUB_ENV
              echo "PKG_CONFIG_PATH=/c/gst/lib/pkgconfig" >> $GITHUB_ENV
              echo "C:/gst/bin" >> $GITHUB_PATH
            build: |
              npm run build --workspace=@lotus-gui/core -- --target x86_64-pc-windows-msvc && npm run extract-angle --workspace=@lotus-gui/core
            target: x86_64-pc-windows-msvc
            build_id: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_id: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            setup: |
              sudo apt-get update
              sudo apt-get install -y libgl1-mesa-dev libssl-dev python3 libfontconfig1-dev dpkg-dev fakeroot rpm pkg-config libdbus-1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-good1.0-dev libgstreamer-plugins-bad1.0-dev
            build: |
              npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_id: x86_64-unknown-linux-suse
            setup: |
              docker pull opensuse/tumbleweed
            build: |
              docker run --rm -v $GITHUB_WORKSPACE:/workspace -w /workspace opensuse/tumbleweed /bin/sh -c "\
                zypper --non-interactive refresh && \
                zypper --non-interactive install -y nodejs-npm gcc gcc-c++ fontconfig-devel Mesa-libGL-devel libopenssl-devel dbus-1-devel pkgconf-pkg-config python311 git gzip tar dpkg rpm-build zip unzip curl clang clang-devel lld gstreamer-devel gstreamer-plugins-base-devel gstreamer-plugins-bad-devel && \
                curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && \
                export PATH=\"\$HOME/.cargo/bin:\$PATH\" && \
                npm install && \
                npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-linux-gnu && \
                mv packages/lotus-core/lotus.linux-x64-gnu.node packages/lotus-core/lotus.linux-x64-suse.node && \
                mv packages/lotus-core/bindings-x86_64-unknown-linux-gnu packages/lotus-core/bindings-x86_64-unknown-linux-suse 2>/dev/null || true \
              "
          - host: ubuntu-latest
            target: x86_64-unknown-freebsd
            build_id: x86_64-unknown-freebsd
            setup: |
              sudo apt-get update
              sudo apt-get install -y libgl1-mesa-dev libssl-dev python3 libfontconfig1-dev libdbus-1-dev pkg-config \
                libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-good1.0-dev libgstreamer-plugins-bad1.0-dev
            build: |
              npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-freebsd
    name: stable - ${{ matrix.settings.build_id }} - node@20
    runs-on: ${{ matrix.settings.host }}
    steps:
      - name: Enable long paths on Windows
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup node
        uses: actions/setup-node@v4
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: 20
          cache: npm
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.build_id }}-cargo-${{ matrix.settings.host }}
      - uses: goto-bus-stop/setup-zig@v2
        if: ${{ matrix.settings.target == 'armv7-unknown-linux-gnueabihf' }}
        with:
          version: 0.11.0
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Install dependencies
        run: npm install
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.build_id }}
          path: |
            packages/lotus-core/*.node
            packages/lotus-core/index.js
            packages/lotus-core/index.d.ts
            packages/lotus-core/windows/*.dll
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move artifacts
        run: |
          npm run artifacts --workspace=@lotus-gui/core
        continue-on-error: true # Just in case script missing, but we handle via direct move
      # Manually move artifacts to core
      - name: Distribute artifacts
        run: |
          ls -R artifacts
          mv artifacts/bindings-*/*.node packages/lotus-core/
          # Copy windows DLLs if they exist
          mkdir -p packages/lotus-core/windows
          cp artifacts/bindings-x86_64-pc-windows-msvc/windows/*.dll packages/lotus-core/windows/ 2>/dev/null || true
          # Copy index.js and index.d.ts from one of the artifact folders (they are identical across platforms)
          cp artifacts/bindings-x86_64-unknown-linux-gnu/index.js packages/lotus-core/
          cp artifacts/bindings-x86_64-unknown-linux-gnu/index.d.ts packages/lotus-core/
          ls -la packages/lotus-core/
      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --workspace=@lotus-gui/core --access public
          npm publish --workspace=@lotus-gui/dev --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: packages/lotus-core/*.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
