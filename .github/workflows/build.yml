name: Build
env:
  DEBUG: napi:*
  APP_NAME: lotus
  MACOSX_DEPLOYMENT_TARGET: '10.13'

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '**/*.gitignore'
      - '.editorconfig'
      - 'docs/**'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build_id: x86_64-pc-windows-msvc
            setup: |
              choco install llvm nasm python311 pkgconfiglite --no-progress -y
              echo "LIBCLANG_PATH=C:/Program Files/LLVM/lib" >> $GITHUB_ENV
              echo "PYTHON=python" >> $GITHUB_ENV
            build: |
              npm run build --workspace=@lotus-gui/core && npm run extract-angle --workspace=@lotus-gui/core
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_id: x86_64-unknown-linux-gnu
            setup: |
              sudo apt-get update && sudo apt-get install -y --fix-missing \
                libfontconfig1-dev libgl1-mesa-dev libssl-dev \
                libdbus-1-dev pkg-config \
                clang libclang-dev lld \
                libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
                libgstreamer-plugins-good1.0-dev libgstreamer-plugins-bad1.0-dev
            build: |
              npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_id: x86_64-unknown-linux-suse
            setup: |
              docker pull opensuse/tumbleweed
            build: |
              # glsl-optimizer bundles its own C11 threads emulation (threads_posix.h) which
              # redefines once_flag, call_once, mtx_t, thrd_t, cnd_t, tss_t etc.
              # On openSUSE Tumbleweed (glibc 2.43), all of these are provided natively:
              #   stdlib.h  -> once_flag, call_once (C11 thread-once, part of stdlib extension)
              #   threads.h -> thrd_t, mtx_t, cnd_t, tss_t and all C11 thread functions
              # Redefining any of them causes "conflicting types" or "static follows non-static" errors.
              #
              # Fix: force-include this shim via CFLAGS="-include /tmp/glslopt_compat.h".
              # glsl's c11/threads.h is skipped when EMULATED_THREADS_H_INCLUDED_ is already set,
              # so threads_posix.h never pulls in <pthread.h> — u_thread.h still needs it for
              # pthread_self, pthread_barrier_*, pthread_setname_np (requires _GNU_SOURCE), etc.
              printf '%s\n' \
                '#ifndef _GNU_SOURCE' \
                '#define _GNU_SOURCE 1' \
                '#endif' \
                '#include <stdlib.h>' \
                '#include <threads.h>' \
                '#include <pthread.h>' \
                '#define EMULATED_THREADS_H_INCLUDED_' \
                > /tmp/glslopt_compat.h
              # Build the CC shim on the host: generating it inside docker -c "..." breaks because
              # inner double-quotes (e.g. grep -Eq "...") terminate the outer -c string and | becomes a pipe.
              printf '%s\n' \
                '#!/usr/bin/env sh' \
                'cmdline="$*"' \
                'if printf %s "$cmdline" | grep -Eq "glsl-optimizer/|glslopt-"; then' \
                '  exec cc -include /tmp/glslopt_compat.h "$@"' \
                'else' \
                '  exec cc "$@"' \
                'fi' \
                > /tmp/cc-glslopt-shim
              chmod +x /tmp/cc-glslopt-shim
              docker run --rm -v $GITHUB_WORKSPACE:/workspace \
                -v /tmp/glslopt_compat.h:/tmp/glslopt_compat.h \
                -v /tmp/cc-glslopt-shim:/tmp/cc-glslopt-shim \
                -w /workspace opensuse/tumbleweed /bin/sh -c "
                set -e
                zypper --non-interactive refresh
                zypper --non-interactive install -y nodejs-npm gcc gcc-c++ fontconfig-devel Mesa-libGL-devel libopenssl-devel dbus-1-devel pkgconf-pkg-config python311 git gzip tar dpkg rpm-build curl clang clang-devel lld gstreamer-devel gstreamer-plugins-base-devel gstreamer-plugins-bad-devel
                curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                export PATH=\"\$HOME/.cargo/bin:\$PATH\"
                export CC=/tmp/cc-glslopt-shim
                npm install
                npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-linux-gnu
                mv packages/lotus-core/lotus.linux-x64-gnu.node packages/lotus-core/lotus.linux-x64-suse.node
                mv packages/lotus-core/bindings-x86_64-unknown-linux-gnu packages/lotus-core/bindings-x86_64-unknown-linux-suse 2>/dev/null || true
              "
          - host: ubuntu-latest
            target: x86_64-unknown-freebsd
            build_id: x86_64-unknown-freebsd
            setup: |
              sudo apt-get update && sudo apt-get install -y --fix-missing \
                libfontconfig1-dev libgl1-mesa-dev libssl-dev \
                clang libclang-dev llvm lld pkg-config build-essential python3

              # Ubuntu 24.04+ does not ship gcc-x86-64-freebsd-gnu. Zig bundles FreeBSD libc + cross C/C++.
              # cc-rs appends --target=x86_64-unknown-freebsd (Rust triple) which Zig rejects.
              # The wrappers strip any incoming --target=* and substitute the correct Zig triple.
              # mozjs_sys also invokes the target wrapper for Linux host probes with
              # --target=x86_64-linux-gnu. Native Ubuntu cc/c++ is GCC and rejects that Clang-only
              # flag, so those host probes must strip --target=* before execing native cc/c++.
              # zig 0.13.0 does not ship FreeBSD libc. Tiny header stubs break libz-sys, and
              # mozjs_sys configure performs link probes that need libc/crt objects too.
              # Use headers and libs from the FreeBSD 14.3-RELEASE base dist as a real sysroot.
              FREE_ROOT="${RUNNER_TEMP:-/tmp}/freebsd-14.3"
              if [ ! -f "$FREE_ROOT/usr/include/stdio.h" ] || [ ! -f "$FREE_ROOT/usr/lib/libc.so" ]; then
                echo "[Lotus] Extracting FreeBSD sysroot from base.txz (one-time ~210 MiB download)..."
                rm -rf "$FREE_ROOT"
                mkdir -p "$FREE_ROOT"
                curl -fSL --proto '=https' --tlsv1.2 \
                  "https://download.freebsd.org/ftp/releases/amd64/14.3-RELEASE/base.txz" \
                  | tar -xJ -f - -C "$FREE_ROOT" --wildcards --no-anchored \
                    "usr/include/*" "lib/*" "usr/lib/*"
              fi
              echo "FREEBSD_SYSROOT=$FREE_ROOT" >> "$GITHUB_ENV"

              sudo install -d /usr/local/bin
              printf '%s\n' \
                '#!/usr/bin/env bash' \
                ': "${FREEBSD_SYSROOT:?FREEBSD_SYSROOT is not set}"' \
                'host_probe=0' \
                'args=()' \
                'skip_next=0' \
                'for a in "$@"; do' \
                '  if (( skip_next )); then skip_next=0; continue; fi' \
                '  if [[ "$a" == --target=*-linux-gnu* ]]; then host_probe=1; continue; fi' \
                '  if [[ "$a" == --target ]]; then host_probe=1; skip_next=1; continue; fi' \
                '  [[ "$a" == --target=* || "$a" == -m64 ]] && continue' \
                '  args+=("$a")' \
                'done' \
                'if (( host_probe )); then exec cc "${args[@]}"; fi' \
                'exec zig cc -target x86_64-freebsd --sysroot "$FREEBSD_SYSROOT" "${args[@]}"' \
                | sudo tee /usr/local/bin/x86_64-unknown-freebsd-gcc >/dev/null
              printf '%s\n' \
                '#!/usr/bin/env bash' \
                ': "${FREEBSD_SYSROOT:?FREEBSD_SYSROOT is not set}"' \
                'host_probe=0' \
                'args=()' \
                'skip_next=0' \
                'for a in "$@"; do' \
                '  if (( skip_next )); then skip_next=0; continue; fi' \
                '  if [[ "$a" == --target=*-linux-gnu* ]]; then host_probe=1; continue; fi' \
                '  if [[ "$a" == --target ]]; then host_probe=1; skip_next=1; continue; fi' \
                '  [[ "$a" == --target=* || "$a" == -m64 ]] && continue' \
                '  args+=("$a")' \
                'done' \
                'if (( host_probe )); then exec c++ "${args[@]}"; fi' \
                'exec zig c++ -target x86_64-freebsd --sysroot "$FREEBSD_SYSROOT" "${args[@]}"' \
                | sudo tee /usr/local/bin/x86_64-unknown-freebsd-g++ >/dev/null
              printf '%s\n' '#!/usr/bin/env bash' 'exec zig ar "$@"' | sudo tee /usr/local/bin/x86_64-unknown-freebsd-ar >/dev/null
              printf '%s\n' '#!/usr/bin/env bash' 'exec zig ranlib "$@"' | sudo tee /usr/local/bin/x86_64-unknown-freebsd-ranlib >/dev/null
              sudo chmod +x /usr/local/bin/x86_64-unknown-freebsd-gcc \
                /usr/local/bin/x86_64-unknown-freebsd-g++ \
                /usr/local/bin/x86_64-unknown-freebsd-ar \
                /usr/local/bin/x86_64-unknown-freebsd-ranlib

              echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
              echo "CC_x86_64_unknown_freebsd=x86_64-unknown-freebsd-gcc" >> $GITHUB_ENV
              echo "CXX_x86_64_unknown_freebsd=x86_64-unknown-freebsd-g++" >> $GITHUB_ENV
              echo "AR_x86_64_unknown_freebsd=x86_64-unknown-freebsd-ar" >> $GITHUB_ENV
              echo "RANLIB_x86_64_unknown_freebsd=x86_64-unknown-freebsd-ranlib" >> $GITHUB_ENV
              echo "CARGO_TARGET_X86_64_UNKNOWN_FREEBSD_LINKER=x86_64-unknown-freebsd-gcc" >> $GITHUB_ENV
            build: |
              npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-freebsd

              # Post-build verification: patch was applied during prebuild, confirm tikv-jemalloc is gone
              echo "[Lotus] Verifying tikv-jemalloc is excluded from FreeBSD dependency tree..."
              if cd packages/lotus-core && cargo tree --target x86_64-unknown-freebsd 2>/dev/null | grep -q "tikv-jemalloc"; then
                echo "[Error] tikv-jemalloc still found in dependency tree after patch!"
                exit 1
              fi
              cd "$GITHUB_WORKSPACE"
              echo "[Lotus] Success: tikv-jemalloc excluded."

              mv packages/lotus-core/lotus.linux-x64-gnu.node packages/lotus-core/lotus.freebsd-x64.node
              mv packages/lotus-core/bindings-x86_64-unknown-linux-gnu packages/lotus-core/bindings-x86_64-unknown-freebsd 2>/dev/null || true
    name: stable - ${{ matrix.settings.build_id }} - node@22
    runs-on: ${{ matrix.settings.host }}
    steps:
      - name: Enable long paths on Windows
        if: runner.os == 'Windows'
        run: |
          git config --global core.longpaths true
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -Force
        shell: powershell
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # MSVC/mozangle still hit legacy MAX_PATH under deep GitHub workspaces (e.g. packages/lotus-core/target/...).
      - name: Short Cargo and temp dirs (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p "/d/t" "/d/tmp"
          echo "CARGO_TARGET_DIR=D:/t" >> "$GITHUB_ENV"
          echo "TMP=D:/tmp" >> "$GITHUB_ENV"
          echo "TEMP=D:/tmp" >> "$GITHUB_ENV"
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
            ${{ runner.os == 'Windows' && 'D:/t' || '' }}
          key: ${{ matrix.settings.build_id }}-cargo-${{ matrix.settings.host }}
      - uses: goto-bus-stop/setup-zig@v2
        if: ${{ matrix.settings.target == 'x86_64-unknown-freebsd' }}
        with:
          version: 0.13.0
      - name: Cache FreeBSD usr/include (base.txz extract)
        if: ${{ matrix.settings.target == 'x86_64-unknown-freebsd' }}
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/freebsd-14.3/usr/include
          key: freebsd-14.3-amd64-usr-include-v1
      - name: Setup GStreamer (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $gstVer = "1.24.13"
          $gstBase = "https://gstreamer.freedesktop.org/data/pkg/windows/$gstVer/msvc"
          $ua = "chocolatey command line"
          Write-Host "Installing GStreamer $gstVer runtime via choco..."
          choco install gstreamer --version $gstVer --no-progress -y
          # Chocolatey sets GSTREAMER_1_0_ROOT_MSVC_X86_64 to the actual install location.
          # Re-read it from the machine scope since this shell session predates the install.
          $gstRoot = [System.Environment]::GetEnvironmentVariable("GSTREAMER_1_0_ROOT_MSVC_X86_64", "Machine")
          if (-not $gstRoot) { $gstRoot = "D:\gstreamer\1.0\msvc_x86_64" }
          $gstRoot = $gstRoot.TrimEnd('\')
          Write-Host "GStreamer runtime root: $gstRoot"
          Write-Host "Downloading GStreamer $gstVer devel MSI..."
          $devel = Join-Path $env:TEMP "gstreamer-devel.msi"
          & curl.exe -fsSL --user-agent $ua `
            -o $devel "$gstBase/gstreamer-1.0-devel-msvc-x86_64-$gstVer.msi"
          $develSize = (Get-Item -LiteralPath $devel).Length
          Write-Host "Devel MSI size: $develSize bytes"
          if ($develSize -lt 50000000) {
            throw "Devel MSI is too small ($develSize B); download failed or is not a valid MSI"
          }
          # Install devel to the same root that choco used for the runtime
          $installDir = Split-Path (Split-Path $gstRoot -Parent) -Parent
          Write-Host "Installing GStreamer devel to $installDir ..."
          # Start-Process -ArgumentList must be an array — a single string breaks msiexec (error 1619).
          $proc = Start-Process -FilePath "msiexec.exe" -ArgumentList @(
            "/i", $devel,
            "/qn",
            ("TARGETDIR=" + $installDir)
          ) -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) { throw "msiexec failed with exit code $($proc.ExitCode)" }
          Write-Host "GStreamer devel installed successfully."
          # Use forward slashes in PKG_CONFIG_PATH - pkgconfiglite on Windows handles
          # backslash paths poorly (splits on ':' treating drive letter as separator).
          $pkgConfigPath = "$gstRoot\lib\pkgconfig" -replace '\\', '/'
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=$gstRoot" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$pkgConfigPath" >> $env:GITHUB_ENV
          Write-Host "PKG_CONFIG_PATH set to: $pkgConfigPath"
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Install dependencies
        run: npm install
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.build_id }}
          path: |
            packages/lotus-core/${{ env.APP_NAME }}.*.node
            packages/lotus-core/windows/*.dll
          if-no-files-found: error
