name: Build
env:
  DEBUG: napi:*
  APP_NAME: lotus
  MACOSX_DEPLOYMENT_TARGET: '10.13'

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '**/*.gitignore'
      - '.editorconfig'
      - 'docs/**'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build_id: x86_64-pc-windows-msvc
            setup: |
              choco install llvm nasm python311 pkgconfiglite --no-progress -y
              cat << 'EOF' > install_gst.ps1
              $gst_version = '1.24.13'
              $gst_runtime_url = "https://gstreamer.freedesktop.org/data/pkg/windows/$gst_version/msvc/gstreamer-1.0-msvc-x86_64-$gst_version.msi"
              $gst_devel_url = "https://gstreamer.freedesktop.org/data/pkg/windows/$gst_version/msvc/gstreamer-1.0-devel-msvc-x86_64-$gst_version.msi"
              
              Write-Host "Downloading GStreamer $gst_version runtime..."
              Invoke-WebRequest -Uri $gst_runtime_url -OutFile 'gstreamer.msi'
              Write-Host 'Installing GStreamer runtime...'
              Start-Process msiexec.exe -ArgumentList '/i gstreamer.msi /qn' -Wait
              
              Write-Host "Downloading GStreamer $gst_version devel..."
              Invoke-WebRequest -Uri $gst_devel_url -OutFile 'gstreamer-devel.msi'
              Write-Host 'Installing GStreamer devel...'
              Start-Process msiexec.exe -ArgumentList '/i gstreamer-devel.msi /qn' -Wait
              
              $gstPath = 'C:\gstreamer\1.0\msvc_x86_64'
              if (-not (Test-Path $gstPath)) { throw "GStreamer not found at $gstPath after installation" }
              
              Write-Host "Found GStreamer at: $gstPath"
              if (Test-Path 'C:\gst') { Remove-Item 'C:\gst' -Force -Recurse }
              New-Item -ItemType Junction -Path 'C:\gst' -Target $gstPath
              EOF
              powershell -ExecutionPolicy Bypass -File install_gst.ps1
              
              echo "LIBCLANG_PATH=C:/Program Files/LLVM/lib" >> $GITHUB_ENV
              echo "PYTHON=python" >> $GITHUB_ENV
              echo "GSTREAMER_1_0_ROOT_X86_64=C:/gst" >> $GITHUB_ENV
              echo "PKG_CONFIG_PATH=/c/gst/lib/pkgconfig" >> $GITHUB_ENV
              echo "C:/gst/bin" >> $GITHUB_PATH
            build: |
              npm run build --workspace=@lotus-gui/core && npm run extract-angle --workspace=@lotus-gui/core
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_id: x86_64-unknown-linux-gnu
            setup: |
              sudo apt-get update && sudo apt-get install -y \
                libfontconfig1-dev libgl1-mesa-dev libssl-dev \
                libdbus-1-dev pkg-config \
                clang libclang-dev lld \
                libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
                libgstreamer-plugins-good1.0-dev libgstreamer-plugins-bad1.0-dev
            build: |
              npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_id: x86_64-unknown-linux-suse
            setup: |
              docker pull opensuse/tumbleweed
            build: |
              docker run --rm -v $GITHUB_WORKSPACE:/workspace -w /workspace opensuse/tumbleweed /bin/sh -c "\
                zypper --non-interactive refresh && \
                zypper --non-interactive install -y nodejs-npm gcc gcc-c++ fontconfig-devel Mesa-libGL-devel libopenssl-devel dbus-1-devel pkgconf-pkg-config python311 git gzip tar dpkg rpm-build curl clang clang-devel lld gstreamer-devel gstreamer-plugins-base-devel gstreamer-plugins-bad-devel && \
                curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && \
                export PATH=\"\$HOME/.cargo/bin:\$PATH\" && \
                npm install && \
                npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-linux-gnu && \
                mv packages/lotus-core/lotus.linux-x64-gnu.node packages/lotus-core/lotus.linux-x64-suse.node && \
                mv packages/lotus-core/bindings-x86_64-unknown-linux-gnu packages/lotus-core/bindings-x86_64-unknown-linux-suse 2>/dev/null || true \
              "
          - host: ubuntu-latest
            target: x86_64-unknown-freebsd
            build_id: x86_64-unknown-freebsd
            setup: |
              sudo apt-get update && sudo apt-get install -y \
                libfontconfig1-dev libgl1-mesa-dev libssl-dev \
                libdbus-1-dev pkg-config \
                clang libclang-dev lld \
                libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
                libgstreamer-plugins-good1.0-dev libgstreamer-plugins-bad1.0-dev
              
              # Pipeline Patch: Exclude FreeBSD from jemalloc usage in the submodule.
              # This is necessary because tikv-jemalloc-sys's configure script fails during cross-compilation for FreeBSD
              # (specifically detecting strerror_r). Since FreeBSD has jemalloc in libc, we don't need to build it.
              # We modify the submodule's Cargo.toml and .rs files transiently during CI to use the system allocator.
              echo "[Lotus] Applying transient FreeBSD jemalloc patches to submodule..."
              find packages/lotus-core/servo -name "Cargo.toml" -o -name "*.rs" -print0 | xargs -0 sed -i 's/target_os = "windows"/target_os = "windows", target_os = "freebsd"/g'
              find packages/lotus-core/servo -name "Cargo.toml" -o -name "*.rs" -print0 | xargs -0 sed -i 's/any(windows/any(windows, target_os = "freebsd"/g'
            build: |
              # Verification: Confirm tikv-jemalloc is not in the dependency tree for FreeBSD
              echo "[Lotus] Verifying dependency tree for FreeBSD..."
              (cd packages/lotus-core && cargo tree --target x86_64-unknown-freebsd | grep "tikv-jemalloc") && (echo "[Error] tikv-jemalloc still found in dependency tree!" && exit 1) || echo "[Lotus] Success: tikv-jemalloc excluded."
              
              npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-freebsd
    name: stable - ${{ matrix.settings.build_id }} - node@22
    runs-on: ${{ matrix.settings.host }}
    steps:
      - name: Enable long paths on Windows
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.build_id }}-cargo-${{ matrix.settings.host }}
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Install dependencies
        run: npm install
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.build_id }}
          path: |
            packages/lotus-core/${{ env.APP_NAME }}.*.node
            packages/lotus-core/windows/*.dll
          if-no-files-found: error
