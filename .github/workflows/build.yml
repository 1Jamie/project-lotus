name: Build
env:
  DEBUG: napi:*
  APP_NAME: lotus
  MACOSX_DEPLOYMENT_TARGET: '10.13'

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '**/*.gitignore'
      - '.editorconfig'
      - 'docs/**'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build_id: x86_64-pc-windows-msvc
            setup: |
              choco install llvm nasm python311 pkgconfiglite gstreamer gstreamer-devel --no-progress -y
              powershell -Command "
                \$paths = @(
                  \"C:\\Program Files\\gstreamer\\1.0\\msvc_x86_64\",
                  \"C:\\gstreamer\\1.0\\msvc_x86_64\",
                  \$env:GSTREAMER_1_0_ROOT_MSVC_X86_64
                )
                \$gstPath = \$paths | Where-Object { \$_ -and (Test-Path \$_) } | Select-Object -First 1
                if (-not \$gstPath) { throw \"GStreamer not found in expected locations\" }
                Write-Host \"Found GStreamer at: \$gstPath\"
                New-Item -ItemType Junction -Path 'C:\gst' -Target \$gstPath
              "
              echo "LIBCLANG_PATH=C:/Program Files/LLVM/lib" >> $GITHUB_ENV
              echo "PYTHON=python" >> $GITHUB_ENV
              echo "GSTREAMER_1_0_ROOT_X86_64=C:/gst" >> $GITHUB_ENV
              echo "PKG_CONFIG_PATH=/c/gst/lib/pkgconfig" >> $GITHUB_ENV
              echo "C:/gst/bin" >> $GITHUB_PATH
            build: |
              npm run build --workspace=@lotus-gui/core && npm run extract-angle --workspace=@lotus-gui/core
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_id: x86_64-unknown-linux-gnu
            setup: |
              sudo apt-get update && sudo apt-get install -y \
                libfontconfig1-dev libgl1-mesa-dev libssl-dev \
                libdbus-1-dev pkg-config \
                clang libclang-dev lld \
                libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
                libgstreamer-plugins-good1.0-dev libgstreamer-plugins-bad1.0-dev
            build: |
              npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_id: x86_64-unknown-linux-suse
            setup: |
              docker pull opensuse/tumbleweed
            build: |
              docker run --rm -v $GITHUB_WORKSPACE:/workspace -w /workspace opensuse/tumbleweed /bin/sh -c "\
                zypper --non-interactive refresh && \
                zypper --non-interactive install -y nodejs-npm gcc gcc-c++ fontconfig-devel Mesa-libGL-devel libopenssl-devel dbus-1-devel pkgconf-pkg-config python311 git gzip tar dpkg rpm-build curl clang clang-devel lld gstreamer-devel gstreamer-plugins-base-devel gstreamer-plugins-bad-devel && \
                curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && \
                export PATH=\"\$HOME/.cargo/bin:\$PATH\" && \
                npm install && \
                npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-linux-gnu && \
                mv packages/lotus-core/lotus.linux-x64-gnu.node packages/lotus-core/lotus.linux-x64-suse.node && \
                mv packages/lotus-core/bindings-x86_64-unknown-linux-gnu packages/lotus-core/bindings-x86_64-unknown-linux-suse 2>/dev/null || true \
              "
          - host: ubuntu-latest
            target: x86_64-unknown-freebsd
            build_id: x86_64-unknown-freebsd
            setup: |
              sudo apt-get update && sudo apt-get install -y \
                libfontconfig1-dev libgl1-mesa-dev libssl-dev \
                libdbus-1-dev pkg-config \
                clang libclang-dev lld \
                libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
                libgstreamer-plugins-good1.0-dev libgstreamer-plugins-bad1.0-dev
            build: |
              # Pipeline Patch: Exclude FreeBSD from jemalloc usage in the submodule
              find packages/lotus-core/servo -name "Cargo.toml" -o -name "*.rs" | xargs sed -i 's/target_os = "windows"/target_os = "windows", target_os = "freebsd"/g'
              find packages/lotus-core/servo -name "Cargo.toml" -o -name "*.rs" | xargs sed -i 's/any(windows/any(windows, target_os = "freebsd"/g'
              npm run build --workspace=@lotus-gui/core -- --target x86_64-unknown-freebsd
    name: stable - ${{ matrix.settings.build_id }} - node@22
    runs-on: ${{ matrix.settings.host }}
    steps:
      - name: Enable long paths on Windows
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.build_id }}-cargo-${{ matrix.settings.host }}
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Install dependencies
        run: npm install
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.build_id }}
          path: |
            packages/lotus-core/${{ env.APP_NAME }}.*.node
            packages/lotus-core/windows/*.dll
          if-no-files-found: error
